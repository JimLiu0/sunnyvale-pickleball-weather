name: Update weather metadata

on:
  schedule:
    # Every hour at :30 UTC (e.g. 3:30 PM PT during daylight saving).
    - cron: "30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-page:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update index.html weather metadata
        env:
          PAGE_URL: https://JimLiu0.github.io/sunnyvale-pickleball-weather/
        run: node scripts/update-page.mjs

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- index.html tuesday/index.html thursday/index.html; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html tuesday/index.html thursday/index.html
          git commit -m "Update weather metadata"
          git push
